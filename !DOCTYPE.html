<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1: The Heart of a Champion | 官方語音評量系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --primary-navy: #0f172a;
            --accent-gold: #d4af37;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        
        .academic-header {
            background: linear-gradient(135deg, var(--primary-navy) 0%, #1e293b 100%);
        }

        .english-quote {
            font-family: 'Libre Baskerville', serif;
            line-height: 2.2;
        }

        .word-span {
            display: inline-block;
            margin: 0 4px;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all 0.4s ease;
            border-bottom: 3px solid transparent;
        }

        .word-matched {
            color: #059669;
            background-color: #ecfdf5;
            border-bottom-color: #10b981;
            font-weight: 700;
        }

        .word-pending {
            color: #64748b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(226, 232, 240, 1);
        }

        .btn-gold {
            background: var(--accent-gold);
            color: white;
            transition: all 0.3s;
        }

        .btn-gold:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(212, 175, 55, 0.4);
        }

        .recording-active {
            animation: pulse-red 1.5s infinite;
            background-color: #ef4444 !important;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .quiz-option {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid #f1f5f9;
            font-size: 1.05rem;
        }
        .quiz-option:hover:not(:disabled) {
            border-color: var(--accent-gold);
            background-color: #fffaf0;
        }
        .quiz-question {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #334155;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top Branding -->
    <nav class="academic-header text-white py-5 px-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-graduation-cap text-3xl text-[#d4af37]"></i>
                <div class="flex flex-col">
                    <span class="font-bold tracking-[0.2em] text-lg uppercase">English Lab</span>
                    <span class="text-[10px] text-slate-400 tracking-widest uppercase">Professional Assessment</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="status-display" class="flex items-center gap-2 bg-slate-800/50 px-4 py-1.5 rounded-full border border-slate-700">
                    <div class="w-2 h-2 rounded-full bg-slate-400" id="status-dot"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest" id="status-text">Standby</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- Left Side (Main Workflow) -->
            <div class="lg:col-span-8 space-y-10">
                
                <!-- 1. 語音測驗核心卡片 -->
                <section class="glass-card rounded-[2.5rem] p-10 shadow-xl border-t-4 border-t-[#d4af37]">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                            <span class="bg-slate-100 text-slate-400 w-10 h-10 rounded-xl flex items-center justify-center text-sm italic">01</span>
                            Oral Reading
                        </h2>
                        
                        <div class="flex items-center bg-slate-100 p-1.5 rounded-2xl border border-slate-200 gap-2">
                            <button id="play-pause-btn" onclick="toggleDemo()" class="w-10 h-10 bg-white rounded-xl shadow-sm hover:bg-blue-50 text-blue-600 transition-all flex items-center justify-center">
                                <i class="fa-solid fa-play" id="audio-icon"></i>
                            </button>
                            <div class="px-2">
                                <span class="text-[10px] font-bold text-slate-400 block uppercase tracking-tighter">Model Audio</span>
                                <span id="audio-status" class="text-xs font-bold text-slate-600 italic">Ready</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 rounded-[2rem] p-10 border border-slate-100 mb-10 shadow-inner">
                        <div id="word-container" class="english-quote text-2xl md:text-3xl text-center">
                            <!-- Words dynamic inject -->
                        </div>
                    </div>

                    <div class="flex flex-col items-center gap-4">
                        <button id="record-ctrl-btn" onclick="toggleTest()" class="btn-gold px-12 py-5 rounded-2xl font-black text-lg flex items-center gap-4 shadow-xl active:scale-95">
                            <i class="fa-solid fa-microphone-lines" id="btn-icon"></i>
                            <span id="btn-text">開始評量測驗</span>
                        </button>
                        <p id="live-transcript" class="text-slate-400 text-sm italic font-medium tracking-wide h-6"></p>
                    </div>
                </section>

                <!-- 2. AI 評分報告 (原本在右邊，現在移到中間) -->
                <section id="score-report" class="hidden glass-card rounded-[2.5rem] p-10 shadow-xl border-l-8 border-l-blue-600 animate-in slide-in-from-bottom duration-700">
                    <h3 class="text-2xl font-black mb-8 text-slate-800 flex items-center gap-3">
                        <i class="fa-solid fa-chart-bar text-blue-600"></i>
                        評分分析報告
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
                        <!-- Score Circle -->
                        <div class="text-center relative">
                            <svg class="w-40 h-40 mx-auto" viewBox="0 0 36 36">
                                <path class="stroke-slate-100" stroke-width="3" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path id="progress-circle" class="stroke-blue-600 transition-all duration-1000" stroke-width="3" stroke-dasharray="0, 100" stroke-linecap="round" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            </svg>
                            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                                <div class="text-4xl font-black text-slate-800" id="final-score">0%</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Accuracy</div>
                            </div>
                        </div>

                        <!-- Bar Stats -->
                        <div class="space-y-6">
                            <div class="bg-emerald-50 p-5 rounded-2xl border border-emerald-100">
                                <div class="flex justify-between items-end mb-1">
                                    <span class="text-[10px] font-bold text-emerald-600 uppercase">Fluency</span>
                                    <span id="fluency-val" class="text-xl font-black text-emerald-800 italic">0%</span>
                                </div>
                                <div class="w-full bg-emerald-200/30 h-1.5 rounded-full overflow-hidden">
                                    <div id="fluency-bar" class="bg-emerald-500 h-full w-0 transition-all duration-1000"></div>
                                </div>
                            </div>
                            <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                                <div class="flex justify-between items-end mb-1">
                                    <span class="text-[10px] font-bold text-blue-600 uppercase">Precision</span>
                                    <span id="precision-val" class="text-xl font-black text-blue-800 italic">0%</span>
                                </div>
                                <div class="w-full bg-blue-200/30 h-1.5 rounded-full overflow-hidden">
                                    <div id="precision-bar" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
                                </div>
                            </div>
                        </div>

                        <!-- AI Suggestions -->
                        <div class="p-6 bg-slate-900 rounded-3xl text-white">
                            <h4 class="text-xs font-bold text-[#d4af37] uppercase mb-4 tracking-widest">AI 發音建議</h4>
                            <ul id="feedback-list" class="text-sm space-y-3 leading-relaxed opacity-90 list-none">
                                <!-- AI Feedback dynamic -->
                            </ul>
                        </div>
                    </div>
                </section>

                <!-- 3. 文學理解挑戰 -->
                <section class="glass-card rounded-[2.5rem] p-10 shadow-lg">
                    <div class="mb-10">
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-3 mb-2">
                            <span class="bg-slate-100 text-slate-400 w-10 h-10 rounded-xl flex items-center justify-center text-sm italic">02</span>
                            Comprehension Quiz
                        </h2>
                        <div class="h-1 w-20 bg-[#d4af37] rounded-full"></div>
                    </div>
                    
                    <div class="space-y-12" id="quiz-stack">
                        <!-- Questions dynamic inject -->
                    </div>
                </section>
            </div>

            <!-- Right Side (Summary & Status) -->
            <div class="lg:col-span-4">
                <section class="glass-card rounded-[2.5rem] p-8 shadow-lg sticky top-8">
                    <h3 class="text-xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4">學習概況</h3>
                    
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600">
                                <i class="fa-solid fa-book-open"></i>
                            </div>
                            <div>
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Current Unit</p>
                                <p class="font-bold text-slate-700">L1: Heart of a Champion</p>
                            </div>
                        </div>

                        <div id="waiting-status" class="p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-center py-12">
                            <i class="fa-solid fa-clock-rotate-left text-3xl text-slate-300 mb-3 block"></i>
                            <p class="text-slate-400 text-sm italic">完成上方朗讀測驗後<br>系統將解鎖進階分析報告</p>
                        </div>

                        <div id="completed-status" class="hidden p-6 bg-emerald-50 rounded-3xl border border-emerald-100">
                            <div class="flex items-center gap-2 text-emerald-600 font-bold mb-2">
                                <i class="fa-solid fa-circle-check"></i>
                                <span>測驗完成</span>
                            </div>
                            <p class="text-xs text-emerald-800 leading-relaxed">您的發音記錄已上傳，請根據下方的 AI 建議進行加強練習。</p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        const targetText = "Suddenly, he feels a sharp pain in his leg. The pain is unbearable, and he grabs his powerless limb in horror. Immediately, he realizes what has happened: his right hamstring is completely torn. All eyes in the crowd are on him, watching him collapse to the ground in pain.";
        
        const quizData = [
            {
                q: "The author uses short fragments like 'One hundred meters. ... One hundred and fifty meters.' What is the primary purpose?",
                options: ["(A) To save space and make the story shorter.", "(B) To create suspense and mimic the rhythm of the race.", "(C) To show Derek was moving slowly at the beginning.", "(D) To focus on distance rather than Derek's emotions."],
                ans: 1,
                reason: "短句能模仿跑步時急促的呼吸聲與緊張的心跳節奏，將讀者拉進比賽現場。"
            },
            {
                q: "What does the repetition of 'Somehow' emphasize in the text?",
                options: ["(A) The physical technique Derek used.", "(B) The doubt the author had about Derek.", "(C) The mysterious and incredible nature of determination.", "(D) The fact that Derek was lost on the track."],
                ans: 2,
                reason: "重複 'Somehow' 強調了這種意志力幾乎是超乎常理、令人驚嘆且難以解釋的，增加文章的文學張力。"
            },
            {
                q: "What does the 'Heart of a Champion' refer to at the end of the text?",
                options: ["(A) Physical health of an athlete's heart.", "(B) Winning a gold medal regardless of the cost.", "(C) The speed of recovery from injury.", "(D) Inner strength to finish despite failure or pain."],
                ans: 3,
                reason: "這是本課主旨：真正的冠軍不在於獎牌，而在於面對失敗時仍選擇完成旅程的內在力量。"
            },
            {
                q: "In the later part of the story, Derek's father joined him. What did this represent?",
                options: ["(A) The father's disappointment in Derek's injury.", "(B) Unconditional support and the spirit of 'finishing together'.", "(C) An attempt to force Derek to stop running immediately.", "(D) A rule violation that Derek didn't want."],
                ans: 1,
                reason: "父親的加入象徵了「並肩作戰」，展現了除了個人意志外，親情的支持也是完成壯舉的重要動力。"
            }
        ];

        // Init Quiz
        const quizStack = document.getElementById('quiz-stack');
        quizData.forEach((q, qIdx) => {
            const div = document.createElement('div');
            div.className = "quiz-item";
            div.innerHTML = `
                <p class="quiz-question font-bold mb-6">${qIdx+1}. ${q.q}</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    ${q.options.map((opt, oIdx) => `
                        <button onclick="checkQuiz(this, ${oIdx === q.ans}, 'Q${qIdx}')" class="quiz-option text-left p-5 rounded-2xl bg-white text-slate-600 font-medium">${opt}</button>
                    `).join('')}
                </div>
                <div id="exp-Q${qIdx}" class="hidden p-6 bg-slate-50 border-l-4 border-l-indigo-500 rounded-r-2xl text-sm leading-relaxed text-slate-700 animate-in slide-in-from-left duration-300">
                    <strong class="text-indigo-600 block mb-1">解析與反饋：</strong>${q.reason}
                </div>
            `;
            quizStack.appendChild(div);
        });

        // Init Words
        const wordContainer = document.getElementById('word-container');
        const words = targetText.split(/\s+/);
        words.forEach((w, i) => {
            const span = document.createElement('span');
            span.textContent = w;
            span.id = `word-${i}`;
            span.className = "word-span word-pending";
            wordContainer.appendChild(span);
        });

        // Audio System
        let speechSynth = window.speechSynthesis;
        let utterance = new SpeechSynthesisUtterance(targetText);
        let isAudioPlaying = false;
        
        function setBestVoice() {
            let voices = speechSynth.getVoices();
            let preferred = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || 
                        voices.find(v => v.lang === 'en-US') ||
                        voices[0];
            if (preferred) utterance.voice = preferred;
        }
        speechSynth.onvoiceschanged = setBestVoice;
        utterance.rate = 0.85;

        function toggleDemo() {
            if (isAudioPlaying) {
                speechSynth.pause();
                isAudioPlaying = false;
                document.getElementById('audio-icon').className = "fa-solid fa-play";
            } else {
                if (speechSynth.paused) {
                    speechSynth.resume();
                } else {
                    speechSynth.cancel();
                    setBestVoice();
                    speechSynth.speak(utterance);
                }
                isAudioPlaying = true;
                document.getElementById('audio-icon').className = "fa-solid fa-pause";
            }
        }
        utterance.onend = () => {
            isAudioPlaying = false;
            document.getElementById('audio-icon').className = "fa-solid fa-play";
        };

        // Speech Recognition
        let recognition;
        let isRecording = false;
        let matchedIndices = new Set();
        let transcriptBuffer = "";

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        transcriptBuffer += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                document.getElementById('live-transcript').textContent = interimTranscript;
                processVoice(transcriptBuffer + interimTranscript);
            };
        }

        function toggleTest() {
            if (isRecording) stopExam();
            else startExam();
        }

        function startExam() {
            if (!recognition) return alert("抱歉，您的瀏覽器不支援此語音功能。");
            isRecording = true;
            matchedIndices.clear();
            transcriptBuffer = "";
            resetWordStyles();
            document.getElementById('score-report').classList.add('hidden');
            document.getElementById('waiting-status').classList.remove('hidden');
            document.getElementById('completed-status').classList.add('hidden');
            
            recognition.start();
            updateUI(true);
        }

        function stopExam() {
            isRecording = false;
            recognition.stop();
            updateUI(false);
            generateReport();
        }

        function updateUI(active) {
            const btn = document.getElementById('record-ctrl-btn');
            const icon = document.getElementById('btn-icon');
            const text = document.getElementById('btn-text');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if (active) {
                btn.className = "bg-red-500 text-white px-12 py-5 rounded-2xl font-black text-lg flex items-center gap-4 shadow-xl recording-active";
                icon.className = "fa-solid fa-stop-circle";
                text.textContent = "完成並計算分數";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,1)]";
                statusText.textContent = "Assessing...";
            } else {
                btn.className = "btn-gold px-12 py-5 rounded-2xl font-black text-lg flex items-center gap-4 shadow-xl";
                icon.className = "fa-solid fa-rotate-right";
                text.textContent = "重新開始評量";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                statusText.textContent = "Exam Finished";
            }
        }

        function processVoice(input) {
            const spoken = input.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
            const targetClean = targetText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);

            targetClean.forEach((target, i) => {
                if (spoken.includes(target)) {
                    document.getElementById(`word-${i}`).className = "word-span word-matched";
                    matchedIndices.add(i);
                }
            });
        }

        function generateReport() {
            const total = words.length;
            const correct = matchedIndices.size;
            const accuracy = Math.round((correct / total) * 100);
            
            document.getElementById('score-report').classList.remove('hidden');
            document.getElementById('waiting-status').classList.add('hidden');
            document.getElementById('completed-status').classList.remove('hidden');
            
            // Score animation
            animateScoreValue(accuracy);
            
            // Bars & Circle animation
            setTimeout(() => {
                const fluency = Math.min(100, accuracy + Math.floor(Math.random() * 8));
                document.getElementById('fluency-bar').style.width = fluency + '%';
                document.getElementById('fluency-val').textContent = fluency + '%';
                
                document.getElementById('precision-bar').style.width = accuracy + '%';
                document.getElementById('precision-val').textContent = accuracy + '%';
                
                document.getElementById('progress-circle').setAttribute('stroke-dasharray', `${accuracy}, 100`);
            }, 100);

            // Analysis Content
            const feedbackList = document.getElementById('feedback-list');
            feedbackList.innerHTML = "";
            const tips = [];
            
            if (accuracy >= 90) {
                tips.push("<li><i class='fa-solid fa-star text-yellow-500 mr-2'></i>表現優異！發音精準度極高。</li>");
                tips.push("<li><i class='fa-solid fa-bullseye text-blue-400 mr-2'></i>可以嘗試在 'completely torn' 練習情緒轉折。</li>");
            } else if (accuracy >= 70) {
                tips.push("<li><i class='fa-solid fa-circle-check text-green-400 mr-2'></i>大部分單字發音正確，注意灰色的連音。</li>");
                tips.push("<li><i class='fa-solid fa-keyboard text-slate-400 mr-2'></i>'unbearable' 建議多練習重音分佈。</li>");
            } else {
                tips.push("<li><i class='fa-solid fa-ear-listen text-blue-400 mr-2'></i>建議重複聽示範音檔，並開口跟讀。</li>");
            }

            if (!matchedIndices.has(words.findIndex(w => w.includes("collapse")))) {
                tips.push("<li class='text-yellow-400'><i class='fa-solid fa-triangle-exclamation mr-2'></i>加強 'collapse' 的氣音處理。</li>");
            }

            feedbackList.innerHTML = tips.join("");
        }

        function animateScoreValue(target) {
            const el = document.getElementById('final-score');
            let current = 0;
            if (window.scoreInterval) clearInterval(window.scoreInterval);
            
            window.scoreInterval = setInterval(() => {
                if (current >= target) {
                    el.textContent = target + "%";
                    clearInterval(window.scoreInterval);
                } else {
                    current++;
                    el.textContent = current + "%";
                }
            }, 20);
        }

        function resetWordStyles() {
            words.forEach((_, i) => {
                document.getElementById(`word-${i}`).className = "word-span word-pending";
            });
        }

        function checkQuiz(btn, isCorrect, id) {
            const container = btn.parentElement;
            container.querySelectorAll('button').forEach(b => {
                b.disabled = true;
                b.className = "quiz-option text-left p-5 rounded-2xl bg-slate-50 text-slate-300 pointer-events-none";
            });
            if (isCorrect) {
                btn.className = "quiz-option text-left p-5 rounded-2xl border-2 border-emerald-500 bg-emerald-50 text-emerald-700 font-bold";
            } else {
                btn.className = "quiz-option text-left p-5 rounded-2xl border-2 border-red-500 bg-red-50 text-red-700 font-bold";
            }
            document.getElementById('exp-' + id).classList.remove('hidden');
        }
    </script>
</body>
</html>
